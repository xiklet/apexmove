<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexMove | Mudanças e Instalações</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="container">

<div class="logo">
<img src="images/logo.png" alt="ApexMove">
</div>

<nav>

<a href="#inicio" style="color: #04197a; font-weight: 600; text-decoration: none;">Início</a>
<a href="#servicos" style="color: #04197a; font-weight: 600; text-decoration: none;">Serviços</a>
<a href="#contacto" style="color: #04197a; font-weight: 600; text-decoration: none;">Contacto</a>

</nav>

</div>

</header>


<section class="hero" id="inicio">

<div class="overlay"></div>

<div class="hero-content">

<h1>Mudanças e Instalações Profissionais</h1>

<p>
Sem mover um dedo, nós movemos o seu lar.
</p>

<a href="#contacto" class="btn">
Pedir Orçamento
</a>

</div>

</section>

<section class="services" id="servicos">

    <div class="container"><center>

        <h2>Os nossos serviços</h2>

        <p class="services-text">
            Soluções completas de mudanças, montagem e instalações para casas e empresas.
        </p>

        <img
            src="images/services.jpg"
            alt="Serviços ApexMove"
            class="services-image">

    </center></div>

</section>

<section class="contact" id="contacto">

    <div class="container">

        <h2>Contacte-nos</h2>

        <form action="https://formsubmit.co/apexmove@outlook.pt" method="POST">

            <input type="hidden" name="_captcha" value="false">

            <input type="hidden" name="_subject" value="Novo pedido de orçamento - ApexMove">

            <input type="hidden" name="_template" value="table">

            <input
                type="text"
                name="Nome"
                placeholder="Nome"
                required>

            <input
                type="email"
                name="Email"
                placeholder="E-mail"
                required>

            <textarea
                name="Mensagem"
                rows="6"
                placeholder="Mensagem"
                required></textarea>

            <label class="checkbox">
                <input type="checkbox" required>
                <span>
                    Autorizo o envio de dados de acordo com o
                    <a href="#">Regulamento Geral de Proteção de Dados</a>.
                </span>
            </label>

            <button type="submit">
                Enviar
            </button>

        </form>

    </div>

</section>


<footer>

<p>

© 2025 ApexMove

</p>

<p>

apexmove@outlook.pt

</p>

</footer>

</body>

</html>
